<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>功能位置编码编辑工具</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #fff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ec;
      --blue: #2563eb;
      --green: #148765;
      --red: #c2410c;
      --amber: #b7791f;
      --shadow: 0 14px 34px rgba(23, 32, 51, .10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      color: #fff;
      background: #101828;
    }
    h1 { margin: 0; font-size: 22px; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .hidden-input { display: none; }
    button, input, select { font: inherit; }
    button {
      height: 36px;
      padding: 0 12px;
      border: 1px solid #cfd7e6;
      border-radius: 7px;
      color: #1f2937;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
    }
    button.primary { color: #fff; background: var(--blue); border-color: var(--blue); }
    button.danger { color: #fff; background: var(--red); border-color: var(--red); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 360px;
      gap: 14px;
      padding: 14px;
      height: calc(100vh - 72px);
      min-height: 660px;
    }
    section {
      min-height: 0;
      overflow: hidden;
      border: 1px solid #e3e8f1;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #e8edf5;
      background: #fbfcff;
    }
    .panel-head strong { font-size: 15px; }
    .panel-body { padding: 14px; height: calc(100% - 49px); overflow: auto; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat {
      border: 1px solid #e5eaf3;
      border-radius: 8px;
      padding: 10px;
      background: #fbfcff;
    }
    .stat strong { display: block; font-size: 22px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 12px; }
    .search {
      width: 100%;
      height: 38px;
      margin-bottom: 10px;
      border: 1px solid #cfd7e6;
      border-radius: 7px;
      padding: 0 10px;
    }
    .tree { list-style: none; margin: 0; padding: 0; }
    .tree ul { list-style: none; margin: 0; padding-left: 20px; border-left: 1px solid #e4e9f2; }
    .tree-item {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      gap: 6px;
      min-height: 32px;
      margin: 3px 0;
    }
    .twisty {
      width: 18px;
      height: 18px;
      border: 1px solid #cfd7e6;
      border-radius: 5px;
      background: #fff;
      line-height: 16px;
      text-align: center;
      font-size: 12px;
      padding: 0;
    }
    .twisty.blank { border-color: transparent; background: transparent; cursor: default; }
    .node-btn {
      display: block;
      width: 100%;
      height: auto;
      min-height: 34px;
      padding: 7px 8px;
      text-align: left;
      border-radius: 7px;
      background: #fff;
      overflow: hidden;
    }
    .node-btn[draggable="true"] { cursor: grab; }
    .node-btn.dragging { opacity: .48; cursor: grabbing; }
    .node-btn.drop-target {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(20, 135, 101, .16);
      background: #f0fdf4;
    }
    .node-btn.selected { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37, 99, 235, .12); }
    .root-drop {
      display: none;
      margin-bottom: 10px;
      border: 1px dashed #98a2b3;
      border-radius: 8px;
      padding: 9px 10px;
      color: #475467;
      background: #f8fafc;
      font-size: 13px;
      text-align: center;
    }
    .root-drop.active { display: block; }
    .root-drop.drop-target {
      border-color: var(--green);
      background: #ecfdf3;
      color: #166534;
    }
    .node-main {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .node-title {
      display: block;
      min-width: 0;
      flex: 1;
      color: #172033;
      font-weight: 740;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-tag {
      flex: 0 0 auto;
      max-width: 86px;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 999px;
      padding: 2px 7px;
      color: #fff;
      font-size: 11px;
      font-weight: 760;
      line-height: 1.35;
    }
    .node-code { display: block; color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
    label { display: block; margin: 12px 0 6px; color: #344054; font-size: 13px; font-weight: 650; }
    .field, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid #cfd7e6;
      border-radius: 7px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
    .validation {
      margin-top: 12px;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.55;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .validation.bad { background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #edf1f7; padding: 8px 7px; text-align: left; vertical-align: top; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 1; color: #344054; }
    td { word-break: break-all; }
    .preview-row { cursor: pointer; }
    .preview-row:hover { background: #f8fafc; }
    .preview-row.selected {
      background: #eff6ff;
      box-shadow: inset 3px 0 0 var(--blue);
    }
    .preview-row.selected td {
      border-bottom-color: #bfdbfe;
    }
    .hint { color: var(--muted); font-size: 12px; line-height: 1.6; margin-top: 10px; }
    .download-box {
      display: none;
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 13px;
      line-height: 1.6;
    }
    .download-box a {
      display: inline-block;
      margin: 6px 8px 0 0;
      color: #1d4ed8;
      font-weight: 700;
    }
    @media (max-width: 1180px) {
      .layout { grid-template-columns: 320px minmax(0, 1fr); height: auto; }
      .editor { grid-column: 1 / -1; }
      section { min-height: 420px; }
    }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .layout { display: block; padding: 10px; }
      section { margin-bottom: 12px; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>功能位置编码编辑工具</h1>
      <div style="color:#cbd5e1;font-size:13px;margin-top:5px;">编辑层级后，可一键导出为“功能位置编码.xlsx”同结构表格</div>
    </div>
    <div class="header-actions">
      <input class="hidden-input" id="importInput" type="file" accept=".xlsx" />
      <button id="importBtn">导入层级 Excel</button>
      <button id="resetBtn">恢复初始数据</button>
      <button class="primary" id="exportBtn">导出 Excel</button>
    </div>
  </header>
  <div class="layout">
    <section>
      <div class="panel-head"><strong>层级树</strong><span id="treeStatus" style="color:#667085;font-size:13px;"></span></div>
      <div class="panel-body">
        <input class="search" id="searchInput" placeholder="搜索名称、编码、分类" />
        <div class="root-drop" id="rootDrop" data-root-drop="1">拖到这里设为根节点</div>
        <div id="tree"></div>
      </div>
    </section>
    <section>
      <div class="panel-head"><strong>导出预览</strong><span style="color:#667085;font-size:13px;">列结构与原表一致</span></div>
      <div class="panel-body">
        <div class="stats">
          <div class="stat"><strong id="nodeCount">0</strong><span>节点数</span></div>
          <div class="stat"><strong id="rootCount">0</strong><span>根节点</span></div>
          <div class="stat"><strong id="leafCount">0</strong><span>末级节点</span></div>
          <div class="stat"><strong id="issueCount">0</strong><span>校验问题</span></div>
        </div>
        <div id="validation" class="validation"></div>
        <table id="previewTable"></table>
      </div>
    </section>
    <section class="editor">
      <div class="panel-head"><strong>节点编辑</strong><span id="selectedLabel" style="color:#667085;font-size:13px;"></span></div>
      <div class="panel-body">
        <label for="codeInput">编码</label>
        <input id="codeInput" class="field" />
        <label for="nameInput">名称</label>
        <input id="nameInput" class="field" />
        <div class="form-grid">
          <div>
            <label for="parentInput">父级编码</label>
            <input id="parentInput" class="field" list="codeList" placeholder="根节点留空" />
          </div>
          <div>
            <label for="categoryInput">分类</label>
            <input id="categoryInput" class="field" list="categoryList" />
          </div>
        </div>
        <div class="form-grid">
          <div>
            <label for="managementTeamInput">管理团队</label>
            <input id="managementTeamInput" class="field" placeholder="可选" />
          </div>
          <div>
            <label for="costCenterInput">成本中心</label>
            <input id="costCenterInput" class="field" placeholder="可选" />
          </div>
        </div>
        <datalist id="codeList"></datalist>
        <datalist id="categoryList">
          <option value="工厂"></option>
          <option value="装置"></option>
          <option value="工艺单元"></option>
          <option value="系统"></option>
          <option value="子系统"></option>
          <option value="动静特种设备"></option>
        </datalist>
        <div class="actions">
          <button class="primary" id="saveBtn">保存修改</button>
          <button id="addChildBtn">新增下级</button>
          <button id="addSiblingBtn">新增同级</button>
          <button class="danger" id="deleteBtn">删除节点</button>
        </div>
        <div class="download-box" id="downloadBox"></div>
        <div class="hint">
          编码必须唯一；父级编码为空表示根节点。修改某个节点编码时，它的直接子节点父级编码会自动同步更新。
        </div>
      </div>
    </section>
  </div>
  <script>
    const INITIAL_ROWS = [];
    const CATEGORY_COLORS = {
      "工厂": "#2563eb",
      "装置": "#148765",
      "工艺单元": "#b7791f",
      "系统": "#c2410c",
      "子系统": "#7048e8",
      "动静特种设备": "#087f8c",
      "未分类": "#667085",
    };
    let rows = structuredClone(INITIAL_ROWS);
    let selectedId = rows[0]?.id || "";
    const collapsed = new Set();
    let draggedId = "";

    const el = {
      tree: document.getElementById("tree"),
      treeStatus: document.getElementById("treeStatus"),
      rootDrop: document.getElementById("rootDrop"),
      searchInput: document.getElementById("searchInput"),
      validation: document.getElementById("validation"),
      previewTable: document.getElementById("previewTable"),
      nodeCount: document.getElementById("nodeCount"),
      rootCount: document.getElementById("rootCount"),
      leafCount: document.getElementById("leafCount"),
      issueCount: document.getElementById("issueCount"),
      selectedLabel: document.getElementById("selectedLabel"),
      codeInput: document.getElementById("codeInput"),
      nameInput: document.getElementById("nameInput"),
      parentInput: document.getElementById("parentInput"),
      categoryInput: document.getElementById("categoryInput"),
      managementTeamInput: document.getElementById("managementTeamInput"),
      costCenterInput: document.getElementById("costCenterInput"),
      codeList: document.getElementById("codeList"),
      downloadBox: document.getElementById("downloadBox"),
      importInput: document.getElementById("importInput"),
    };

    function byId(id) { return rows.find(row => row.id === id); }
    function byCode(code) { return rows.find(row => row.code === code); }
    function childrenOf(code) { return rows.filter(row => row.parent === code).sort((a, b) => a.code.localeCompare(b.code, "zh-Hans-CN")); }
    function roots() { return rows.filter(row => !row.parent || !byCode(row.parent)).sort((a, b) => a.code.localeCompare(b.code, "zh-Hans-CN")); }
    function nextId() { return "n" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
    function uniqueCode(base) {
      let code = base;
      let index = 1;
      while (byCode(code)) {
        code = `${base}-${String(index).padStart(2, "0")}`;
        index += 1;
      }
      return code;
    }
    function descendants(code, out = new Set()) {
      childrenOf(code).forEach(child => {
        out.add(child.code);
        descendants(child.code, out);
      });
      return out;
    }
    function orderedRows() {
      const out = [];
      const seen = new Set();
      function walk(node) {
        if (seen.has(node.id)) return;
        seen.add(node.id);
        out.push(node);
        childrenOf(node.code).forEach(walk);
      }
      roots().forEach(walk);
      rows.filter(row => !seen.has(row.id)).sort((a, b) => a.code.localeCompare(b.code, "zh-Hans-CN")).forEach(walk);
      return out;
    }
    function validate() {
      const issues = [];
      const codeCounts = new Map();
      rows.forEach(row => codeCounts.set(row.code, (codeCounts.get(row.code) || 0) + 1));
      rows.forEach(row => {
        if (!row.code.trim()) issues.push("存在空编码节点");
        if (!row.name.trim()) issues.push(`${row.code || "未命名节点"} 缺少名称`);
        if (!row.category.trim()) issues.push(`${row.code || "未命名节点"} 缺少分类`);
        if (codeCounts.get(row.code) > 1) issues.push(`${row.code} 编码重复`);
        if (row.parent && !byCode(row.parent)) issues.push(`${row.code} 的父级编码不存在：${row.parent}`);
        if (row.parent === row.code) issues.push(`${row.code} 不能把自己作为父级`);
      });
      rows.forEach(row => {
        let cursor = row.parent;
        const seen = new Set([row.code]);
        while (cursor) {
          if (seen.has(cursor)) {
            issues.push(`${row.code} 存在循环父级关系`);
            break;
          }
          seen.add(cursor);
          cursor = byCode(cursor)?.parent || "";
        }
      });
      return [...new Set(issues)];
    }

    function render() {
      if (!selectedId || !byId(selectedId)) selectedId = rows[0]?.id || "";
      renderTree();
      renderForm();
      renderPreview();
      renderCodeList();
    }
    function renderTree() {
      const query = el.searchInput.value.trim().toLowerCase();
      const matchCodes = new Set();
      if (query) {
        rows.forEach(row => {
          const text = `${row.code} ${row.name} ${row.category}`.toLowerCase();
          if (text.includes(query)) {
            let cursor = row;
            while (cursor) {
              matchCodes.add(cursor.code);
              cursor = byCode(cursor.parent);
            }
          }
        });
      }
      function nodeHtml(row) {
        if (query && !matchCodes.has(row.code)) return "";
        const kids = childrenOf(row.code);
        const hasKids = kids.length > 0;
        const isCollapsed = collapsed.has(row.code);
        const childHtml = hasKids && !isCollapsed ? `<ul>${kids.map(nodeHtml).join("")}</ul>` : "";
        return `<li>
          <div class="tree-item">
            <button class="twisty ${hasKids ? "" : "blank"}" data-toggle="${escapeAttr(row.code)}">${hasKids ? (isCollapsed ? "+" : "-") : ""}</button>
            <button class="node-btn ${row.id === selectedId ? "selected" : ""}" data-select="${escapeAttr(row.id)}" draggable="true">
              <span class="node-main">
                <span class="node-title">${escapeHtml(row.name)}</span>
                <span class="node-tag" style="background:${categoryColor(row.category)}">${escapeHtml(row.category)}</span>
              </span>
              <span class="node-code">${escapeHtml(row.code)}</span>
            </button>
          </div>
          ${childHtml}
        </li>`;
      }
      el.tree.innerHTML = `<ul class="tree">${roots().map(nodeHtml).join("")}</ul>`;
      el.treeStatus.textContent = `${rows.length} 个节点`;
      el.tree.querySelectorAll("[data-select]").forEach(btn => btn.addEventListener("click", () => {
        selectedId = btn.dataset.select;
        render();
      }));
      el.tree.querySelectorAll("[data-select]").forEach(btn => {
        btn.addEventListener("dragstart", onNodeDragStart);
        btn.addEventListener("dragend", onNodeDragEnd);
        btn.addEventListener("dragover", onNodeDragOver);
        btn.addEventListener("dragleave", onNodeDragLeave);
        btn.addEventListener("drop", onNodeDrop);
      });
      el.rootDrop.addEventListener("dragover", onRootDragOver);
      el.rootDrop.addEventListener("dragleave", onRootDragLeave);
      el.rootDrop.addEventListener("drop", onRootDrop);
      el.tree.querySelectorAll("[data-toggle]").forEach(btn => btn.addEventListener("click", () => {
        const code = btn.dataset.toggle;
        if (!code) return;
        collapsed.has(code) ? collapsed.delete(code) : collapsed.add(code);
        renderTree();
      }));
    }
    function onNodeDragStart(event) {
      draggedId = event.currentTarget.dataset.select || "";
      selectedId = draggedId;
      event.currentTarget.classList.add("dragging");
      el.rootDrop.classList.add("active");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedId);
    }
    function onNodeDragEnd(event) {
      event.currentTarget.classList.remove("dragging");
      clearDropTargets();
      draggedId = "";
    }
    function onNodeDragOver(event) {
      const targetId = event.currentTarget.dataset.select;
      if (!canMoveNode(draggedId, targetId)) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      event.currentTarget.classList.add("drop-target");
    }
    function onNodeDragLeave(event) {
      event.currentTarget.classList.remove("drop-target");
    }
    function onNodeDrop(event) {
      event.preventDefault();
      const targetId = event.currentTarget.dataset.select;
      moveNode(draggedId, targetId);
    }
    function onRootDragOver(event) {
      if (!draggedId) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      el.rootDrop.classList.add("drop-target");
    }
    function onRootDragLeave() {
      el.rootDrop.classList.remove("drop-target");
    }
    function onRootDrop(event) {
      event.preventDefault();
      moveNode(draggedId, "");
    }
    function clearDropTargets() {
      el.rootDrop.classList.remove("active", "drop-target");
      el.tree.querySelectorAll(".drop-target").forEach(item => item.classList.remove("drop-target"));
    }
    function canMoveNode(sourceId, targetId) {
      if (!sourceId) return false;
      if (!targetId) return true;
      if (sourceId === targetId) return false;
      const source = byId(sourceId);
      const target = byId(targetId);
      if (!source || !target) return false;
      return !descendants(source.code).has(target.code);
    }
    function moveNode(sourceId, targetId) {
      const source = byId(sourceId);
      const target = targetId ? byId(targetId) : null;
      if (!source || (targetId && !target) || !canMoveNode(sourceId, targetId)) {
        clearDropTargets();
        return;
      }
      source.parent = target ? target.code : "";
      selectedId = source.id;
      if (target) collapsed.delete(target.code);
      clearDropTargets();
      render();
    }
    function renderForm() {
      const row = byId(selectedId);
      if (!row) {
        [el.codeInput, el.nameInput, el.parentInput, el.categoryInput, el.managementTeamInput, el.costCenterInput].forEach(input => input.value = "");
        el.selectedLabel.textContent = "未选择";
        return;
      }
      el.selectedLabel.textContent = row.code;
      el.codeInput.value = row.code;
      el.nameInput.value = row.name;
      el.parentInput.value = row.parent || "";
      el.categoryInput.value = row.category;
      el.managementTeamInput.value = row.managementTeam || "";
      el.costCenterInput.value = row.costCenter || "";
    }
    function renderPreview() {
      const ordered = orderedRows();
      const issues = validate();
      const leafs = rows.filter(row => childrenOf(row.code).length === 0).length;
      el.nodeCount.textContent = rows.length;
      el.rootCount.textContent = roots().length;
      el.leafCount.textContent = leafs;
      el.issueCount.textContent = issues.length;
      el.validation.className = issues.length ? "validation bad" : "validation";
      el.validation.innerHTML = issues.length ? issues.slice(0, 8).map(escapeHtml).join("<br>") : "校验通过，可以导出 Excel。";
      el.previewTable.innerHTML = `<thead><tr><th>编码</th><th>名称</th><th>父级编码</th><th>分类</th><th>管理团队</th><th>成本中心</th></tr></thead><tbody>${ordered.map(row => `
        <tr class="preview-row ${row.id === selectedId ? "selected" : ""}" data-preview-id="${escapeAttr(row.id)}"><td>${escapeHtml(row.code)}</td><td>${escapeHtml(row.name)}</td><td>${escapeHtml(row.parent || "")}</td><td>${escapeHtml(row.category)}</td><td>${escapeHtml(row.managementTeam || "")}</td><td>${escapeHtml(row.costCenter || "")}</td></tr>
      `).join("")}</tbody>`;
      el.previewTable.querySelectorAll("[data-preview-id]").forEach(row => row.addEventListener("click", () => {
        selectedId = row.dataset.previewId;
        render();
      }));
      scrollSelectedPreviewRow();
    }
    function scrollSelectedPreviewRow() {
      const selectedRow = el.previewTable.querySelector(".preview-row.selected");
      if (!selectedRow) return;
      selectedRow.scrollIntoView({ block: "nearest", inline: "nearest" });
    }
    function renderCodeList() {
      el.codeList.innerHTML = rows.map(row => `<option value="${escapeAttr(row.code)}"></option>`).join("");
    }
    function saveSelected() {
      const row = byId(selectedId);
      if (!row) return;
      const oldCode = row.code;
      const next = {
        code: el.codeInput.value.trim(),
        name: el.nameInput.value.trim(),
        parent: el.parentInput.value.trim(),
        category: el.categoryInput.value.trim(),
        managementTeam: el.managementTeamInput.value.trim(),
        costCenter: el.costCenterInput.value.trim(),
      };
      if (!next.code || !next.name || !next.category) {
        alert("编码、名称、分类不能为空。");
        return;
      }
      const duplicate = rows.find(item => item.id !== row.id && item.code === next.code);
      if (duplicate) {
        alert("编码重复，请修改后再保存。");
        return;
      }
      if (next.parent && !byCode(next.parent)) {
        alert("父级编码不存在，请先创建父级节点或留空。");
        return;
      }
      if (next.parent === next.code || descendants(oldCode).has(next.parent)) {
        alert("父级不能是自己或自己的下级节点。");
        return;
      }
      row.code = next.code;
      row.name = next.name;
      row.parent = next.parent;
      row.category = next.category;
      row.managementTeam = next.managementTeam;
      row.costCenter = next.costCenter;
      if (oldCode !== next.code) {
        rows.forEach(item => {
          if (item.parent === oldCode) item.parent = next.code;
        });
      }
      render();
    }
    function addChild() {
      const parent = byId(selectedId);
      const base = parent ? `${parent.code}-NEW` : "NEW";
      const row = {
        id: nextId(),
        code: uniqueCode(base),
        name: "新节点",
        parent: parent?.code || "",
        category: parent ? guessChildCategory(parent.category) : "工厂",
        managementTeam: "",
        costCenter: "",
      };
      rows.push(row);
      selectedId = row.id;
      collapsed.delete(row.parent);
      render();
    }
    function addSibling() {
      const current = byId(selectedId);
      const base = current?.parent ? `${current.parent}-NEW` : "NEW";
      const row = {
        id: nextId(),
        code: uniqueCode(base),
        name: "新节点",
        parent: current?.parent || "",
        category: current?.category || "未分类",
        managementTeam: "",
        costCenter: "",
      };
      rows.push(row);
      selectedId = row.id;
      render();
    }
    function deleteSelected() {
      const row = byId(selectedId);
      if (!row) return;
      const removeCodes = descendants(row.code);
      removeCodes.add(row.code);
      if (!confirm(`确定删除“${row.name}”及其 ${removeCodes.size - 1} 个下级节点吗？`)) return;
      rows = rows.filter(item => !removeCodes.has(item.code));
      selectedId = rows[0]?.id || "";
      render();
    }
    function guessChildCategory(category) {
      const order = ["工厂", "装置", "工艺单元", "系统", "子系统", "动静特种设备"];
      const index = order.indexOf(category);
      return order[Math.min(index + 1, order.length - 1)] || "未分类";
    }

    async function importHierarchyExcel(file) {
      try {
        const result = await readXlsxBestSheet(file);
        const matrix = result.matrix;
        const imported = rowsFromHierarchyMatrix(matrix);
        if (!imported.length) {
          alert("没有识别到层级数据。请确认 Excel 中有分类行，例如：工厂、装置、工艺单元、系统、子系统、动静特种设备；或厂区、大装置、单元、设备等自定义分类。");
          return;
        }
        if (!confirm(`已识别 ${imported.length} 个层级节点。导入后会替换当前页面数据，是否继续？`)) return;
        rows = imported;
        selectedId = rows[0]?.id || "";
        collapsed.clear();
        el.downloadBox.style.display = "block";
        el.downloadBox.innerHTML = `已从“${escapeHtml(result.sheetName)}”第 ${result.headerRow + 1} 行表头导入 ${rows.length} 个节点。请检查预览后再导出 Excel。`;
        render();
      } catch (error) {
        el.downloadBox.style.display = "block";
        el.downloadBox.innerHTML = `导入失败：${escapeHtml(error.message || error)}`;
      } finally {
        el.importInput.value = "";
      }
    }
    async function readXlsxBestSheet(file) {
      const bytes = new Uint8Array(await file.arrayBuffer());
      const files = await unzipXlsx(bytes);
      const workbookDoc = parseXml(textFile(files, "xl/workbook.xml"));
      const relsDoc = parseXml(textFile(files, "xl/_rels/workbook.xml.rels"));
      const sharedStrings = parseSharedStrings(files.get("xl/sharedStrings.xml") ? decodeUtf8(files.get("xl/sharedStrings.xml")) : "");
      const rels = new Map(xmlNodes(relsDoc, "Relationship").map(node => [node.getAttribute("Id"), node.getAttribute("Target")]));
      const sheets = xmlNodes(workbookDoc, "sheet").map(node => ({
        name: node.getAttribute("name") || "",
        relId: node.getAttribute("r:id") || node.getAttributeNS("http://schemas.openxmlformats.org/officeDocument/2006/relationships", "id") || "",
      }));
      if (!sheets.length) throw new Error("未找到工作表。");
      let best = null;
      for (const sheet of sheets) {
        const target = rels.get(sheet.relId);
        if (!target) continue;
        const sheetPath = resolveWorkbookTarget(target);
        const sheetBytes = files.get(sheetPath);
        if (!sheetBytes) continue;
        const matrix = parseSheetMatrix(decodeUtf8(sheetBytes), sharedStrings);
        const header = detectHierarchyHeader(matrix);
        const score = header ? header.score : 0;
        if (!best || score > best.score) {
          best = { sheetName: sheet.name, matrix, score, headerRow: header?.headerRow ?? 0 };
        }
      }
      if (!best || !best.score) throw new Error("没有找到包含层级表头的工作表。");
      return best;
    }
    function resolveWorkbookTarget(target) {
      const clean = target.replace(/^\.\//, "").replace(/^\//, "");
      return clean.startsWith("xl/") ? clean : "xl/" + clean;
    }
    function rowsFromHierarchyMatrix(matrix) {
      const header = detectHierarchyHeader(matrix);
      if (!header || !header.levels.length) return [];
      const { headerRow, levels, teamCol } = header;
      const stack = [];
      const imported = [];
      const usedCodes = new Set();
      const siblingSerial = new Map();
      let currentTeam = "";

      for (let r = headerRow + 1; r < matrix.length; r++) {
        if (teamCol >= 0 && String(matrix[r]?.[teamCol] || "").trim()) {
          currentTeam = String(matrix[r][teamCol]).trim();
        }
        for (let level = 0; level < levels.length; level++) {
          const { col, category, codeCol } = levels[level];
          const rawName = String(matrix[r][col] || "").trim();
          if (!rawName) continue;
          stack.length = level;
          const parent = level > 0 ? stack[level - 1]?.code || "" : "";
          const codeHint = codeCol >= 0 ? String(matrix[r][codeCol] || "").trim() : "";
          const segment = codeSegment(rawName, category, parent, siblingSerial, codeHint);
          const code = uniqueImportedCode(parent ? `${parent}-${segment}` : segment, usedCodes);
          const row = { id: nextId(), code, name: rawName, parent, category, managementTeam: currentTeam, costCenter: "" };
          imported.push(row);
          usedCodes.add(code);
          stack[level] = row;
        }
      }
      return imported;
    }
    function detectHierarchyHeader(matrix) {
      const fixedCategories = ["工厂", "装置", "工艺单元", "系统", "子系统", "动静特种设备"];
      let best = null;
      for (let r = 0; r < Math.min(matrix.length, 15); r++) {
        const row = matrix[r] || [];
        const fixedLevels = [];
        let fixedCursor = -1;
        for (const category of fixedCategories) {
          const col = row.findIndex((value, c) => c > fixedCursor && String(value || "").trim() === category);
          if (col >= 0) {
            fixedLevels.push({ col, category, codeCol: -1 });
            fixedCursor = col;
          }
        }
        if (fixedLevels.length === fixedCategories.length) {
          return { headerRow: r, levels: fixedLevels, teamCol: row.findIndex(value => String(value || "").trim() === "团队"), score: 10000 + fixedLevels.length };
        }
        const levels = [];
        let sawHierarchyStart = false;
        row.forEach((value, c) => {
          const label = String(value || "").trim();
          if (!label) return;
          if (isHierarchyStart(label)) sawHierarchyStart = true;
          if (!isHierarchyCategory(label, sawHierarchyStart)) return;
          const prevLabel = String(row[c - 1] || "").trim();
          levels.push({ col: c, category: normalizeCategory(label), codeCol: isCodeHelper(prevLabel) ? c - 1 : -1 });
        });
        const exactScore = levels.filter(item => fixedCategories.includes(item.category)).length;
        const score = levels.length * 10 + exactScore;
        if (levels.length >= 2 && (!best || score > best.score)) {
          best = { headerRow: r, levels, teamCol: row.findIndex(value => String(value || "").trim() === "团队"), score };
        }
      }
      return best;
    }
    function isHierarchyStart(label) {
      return ["工厂", "厂区"].includes(label);
    }
    function isHierarchyCategory(label, sawHierarchyStart) {
      if (isCodeHelper(label) || ["序号", "部门编码", "部门", "团队"].includes(label)) return false;
      const exact = ["工厂", "装置", "工艺单元", "系统", "子系统", "动静特种设备", "厂区", "大装置", "单元"].includes(label);
      const fuzzy = /(设备|建筑物|构筑物|辅助系统|电气|仪表|设施|区域)/.test(label);
      return exact || (sawHierarchyStart && fuzzy);
    }
    function normalizeCategory(label) {
      const map = {
        "厂区": "工厂",
        "大装置": "装置",
        "单元": "工艺单元",
      };
      return map[label] || label;
    }
    function isCodeHelper(label) {
      return /^(单元号|编码|编号|代码)$/.test(label);
    }
    function codeSegment(name, category, parent, siblingSerial, codeHint = "") {
      const leading = String(codeHint || name).trim().match(/^[A-Za-z0-9]+(?:-[A-Za-z0-9]+)*/)?.[0];
      if (leading) return leading.toUpperCase();
      const prefixMap = {
        "工厂": "GC",
        "装置": "ZH",
        "工艺单元": "DY",
        "系统": "XT",
        "子系统": "ZXT",
        "动静特种设备": "SB",
      };
      const prefix = prefixMap[category] || "LJ";
      const key = `${parent}|${category}`;
      const serial = (siblingSerial.get(key) || 0) + 1;
      siblingSerial.set(key, serial);
      return `${prefix}${String(serial).padStart(3, "0")}`;
    }
    function uniqueImportedCode(base, usedCodes) {
      let code = base;
      let serial = 2;
      while (usedCodes.has(code)) {
        code = `${base}-${String(serial).padStart(2, "0")}`;
        serial += 1;
      }
      return code;
    }
    async function unzipXlsx(bytes) {
      const entries = new Map();
      let pos = 0;
      while (pos + 30 <= bytes.length) {
        const signature = getU32(bytes, pos);
        if (signature !== 0x04034b50) break;
        const method = getU16(bytes, pos + 8);
        const compressedSize = getU32(bytes, pos + 18);
        const uncompressedSize = getU32(bytes, pos + 22);
        const nameLength = getU16(bytes, pos + 26);
        const extraLength = getU16(bytes, pos + 28);
        const nameStart = pos + 30;
        const name = decodeUtf8(bytes.slice(nameStart, nameStart + nameLength));
        const dataStart = nameStart + nameLength + extraLength;
        const compressed = bytes.slice(dataStart, dataStart + compressedSize);
        let data;
        if (method === 0) {
          data = compressed;
        } else if (method === 8) {
          data = await inflateRaw(compressed);
          if (uncompressedSize && data.length !== uncompressedSize) {
            data = data.slice(0, uncompressedSize);
          }
        } else {
          throw new Error(`暂不支持该 Excel 压缩方式：${method}`);
        }
        entries.set(name, data);
        pos = dataStart + compressedSize;
      }
      if (!entries.size) throw new Error("无法读取 xlsx 文件内容。");
      return entries;
    }
    async function inflateRaw(bytes) {
      if (!("DecompressionStream" in window)) throw new Error("当前浏览器不支持解压 xlsx，请使用新版 Chrome 或 Edge。");
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
      return new Uint8Array(await new Response(stream).arrayBuffer());
    }
    function textFile(files, name) {
      const bytes = files.get(name) || files.get(name.replace(/^xl\//, ""));
      if (!bytes) throw new Error(`xlsx 中缺少文件：${name}`);
      return decodeUtf8(bytes);
    }
    function decodeUtf8(bytes) {
      return new TextDecoder("utf-8").decode(bytes);
    }
    function getU16(bytes, pos) {
      return bytes[pos] | (bytes[pos + 1] << 8);
    }
    function getU32(bytes, pos) {
      return (bytes[pos] | (bytes[pos + 1] << 8) | (bytes[pos + 2] << 16) | (bytes[pos + 3] << 24)) >>> 0;
    }
    function parseXml(xml) {
      const doc = new DOMParser().parseFromString(xml, "application/xml");
      const error = doc.getElementsByTagName("parsererror")[0];
      if (error) throw new Error("Excel XML 解析失败。");
      return doc;
    }
    function xmlNodes(parent, localName) {
      return [...parent.getElementsByTagNameNS("*", localName)];
    }
    function textFromTNodes(node) {
      return xmlNodes(node, "t").map(item => item.textContent || "").join("");
    }
    function parseSharedStrings(xml) {
      if (!xml) return [];
      const doc = parseXml(xml);
      return xmlNodes(doc, "si").map(si => textFromTNodes(si));
    }
    function parseSheetMatrix(xml, sharedStrings) {
      const doc = parseXml(xml);
      const matrix = [];
      for (const rowNode of xmlNodes(doc, "row")) {
        const r = Number(rowNode.getAttribute("r") || matrix.length + 1) - 1;
        matrix[r] ||= [];
        for (const cellNode of xmlNodes(rowNode, "c")) {
          const ref = cellNode.getAttribute("r")?.match(/^([A-Z]+)\d+$/)?.[1] || "A";
          const c = columnIndex(ref);
          const type = cellNode.getAttribute("t") || "";
          let value = "";
          if (type === "inlineStr") {
            value = textFromTNodes(cellNode);
          } else {
            const raw = xmlNodes(cellNode, "v")[0]?.textContent || "";
            value = type === "s" ? (sharedStrings[Number(raw)] ?? "") : raw;
          }
          matrix[r][c] = value;
        }
      }
      return matrix;
    }
    function columnIndex(label) {
      let index = 0;
      for (const ch of label) index = index * 26 + ch.charCodeAt(0) - 64;
      return index - 1;
    }
    function unescapeXml(value) {
      return String(value ?? "")
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&quot;/g, '"')
        .replace(/&apos;/g, "'")
        .replace(/&amp;/g, "&");
    }

    function exportExcel() {
      const issues = validate();
      if (issues.length && !confirm(`当前有 ${issues.length} 个校验问题，仍然导出吗？`)) return;
      const values = [["编码", "名称", "父级编码", "分类", "管理团队", "成本中心"], ...orderedRows().map(row => [row.code, row.name, row.parent || "", row.category, row.managementTeam || "", row.costCenter || ""])];
      try {
        const bytes = buildXlsx(values);
        const xlsxUrl = makeDownloadUrl(bytes, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
        const csvUrl = makeDownloadUrl(csvBytes(values), "text/csv;charset=utf-8");
        el.downloadBox.style.display = "block";
        el.downloadBox.innerHTML = `已生成导出文件。若浏览器没有自动下载，请点击下面的备用链接。<br>
          <a id="manualXlsx" href="${xlsxUrl}" download="功能位置编码.xlsx">下载 Excel</a>
          <a href="${csvUrl}" download="功能位置编码.csv">下载 CSV 备用</a>`;
        const manual = document.getElementById("manualXlsx");
        manual.click();
      } catch (error) {
        el.downloadBox.style.display = "block";
        el.downloadBox.innerHTML = `导出失败：${escapeHtml(error.message || error)}`;
      }
    }
    function makeDownloadUrl(bytes, type) {
      const blob = new Blob([bytes], { type });
      return URL.createObjectURL(blob);
    }
    function csvBytes(values) {
      const text = "\ufeff" + values.map(row => row.map(value => {
        const cell = String(value ?? "");
        return /[",\n]/.test(cell) ? `"${cell.replace(/"/g, '""')}"` : cell;
      }).join(",")).join("\n");
      return new TextEncoder().encode(text);
    }
    function colName(index) {
      let name = "";
      while (index > 0) {
        const mod = (index - 1) % 26;
        name = String.fromCharCode(65 + mod) + name;
        index = Math.floor((index - mod) / 26);
      }
      return name;
    }
    function xmlEscape(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&apos;"}[ch]));
    }
    function sheetXml(values) {
      const rowsXml = values.map((row, r) => {
        const cells = row.map((value, c) => {
          const ref = `${colName(c + 1)}${r + 1}`;
          return `<c r="${ref}" t="inlineStr"><is><t>${xmlEscape(value)}</t></is></c>`;
        }).join("");
        return `<row r="${r + 1}">${cells}</row>`;
      }).join("");
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <cols><col min="1" max="1" width="34" customWidth="1"/><col min="2" max="2" width="24" customWidth="1"/><col min="3" max="3" width="34" customWidth="1"/><col min="4" max="4" width="18" customWidth="1"/><col min="5" max="5" width="20" customWidth="1"/><col min="6" max="6" width="20" customWidth="1"/></cols>
  <sheetData>${rowsXml}</sheetData>
</worksheet>`;
    }
    function buildXlsx(values) {
      const files = {
        "[Content_Types].xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>`,
        "_rels/.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`,
        "xl/workbook.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="功能位置编码" sheetId="1" r:id="rId1"/></sheets></workbook>`,
        "xl/_rels/workbook.xml.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>`,
        "xl/worksheets/sheet1.xml": sheetXml(values),
      };
      return zipStore(files);
    }
    const crcTable = (() => {
      const table = new Uint32Array(256);
      for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
        table[n] = c >>> 0;
      }
      return table;
    })();
    function crc32(bytes) {
      let c = 0xffffffff;
      for (const byte of bytes) c = crcTable[(c ^ byte) & 0xff] ^ (c >>> 8);
      return (c ^ 0xffffffff) >>> 0;
    }
    function u16(value) { return [value & 255, (value >>> 8) & 255]; }
    function u32(value) { return [value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255]; }
    function zipStore(files) {
      const encoder = new TextEncoder();
      const chunks = [];
      const central = [];
      let offset = 0;
      for (const [name, content] of Object.entries(files)) {
        const nameBytes = encoder.encode(name);
        const data = encoder.encode(content);
        const crc = crc32(data);
        const local = new Uint8Array([
          ...u32(0x04034b50), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0),
          ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(nameBytes.length), ...u16(0)
        ]);
        chunks.push(local, nameBytes, data);
        central.push(new Uint8Array([
          ...u32(0x02014b50), ...u16(20), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0),
          ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(nameBytes.length), ...u16(0), ...u16(0),
          ...u16(0), ...u16(0), ...u32(0), ...u32(offset)
        ]), nameBytes);
        offset += local.length + nameBytes.length + data.length;
      }
      const centralOffset = offset;
      const centralSize = central.reduce((sum, part) => sum + part.length, 0);
      const fileCount = Object.keys(files).length;
      const end = new Uint8Array([
        ...u32(0x06054b50), ...u16(0), ...u16(0), ...u16(fileCount), ...u16(fileCount),
        ...u32(centralSize), ...u32(centralOffset), ...u16(0)
      ]);
      const all = [...chunks, ...central, end];
      const total = all.reduce((sum, part) => sum + part.length, 0);
      const out = new Uint8Array(total);
      let pos = 0;
      all.forEach(part => { out.set(part, pos); pos += part.length; });
      return out;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }
    function escapeAttr(value) { return escapeHtml(value); }
    function categoryColor(category) {
      return CATEGORY_COLORS[category] || CATEGORY_COLORS["未分类"];
    }

    document.getElementById("saveBtn").addEventListener("click", saveSelected);
    document.getElementById("addChildBtn").addEventListener("click", addChild);
    document.getElementById("addSiblingBtn").addEventListener("click", addSibling);
    document.getElementById("deleteBtn").addEventListener("click", deleteSelected);
    document.getElementById("exportBtn").addEventListener("click", exportExcel);
    document.getElementById("importBtn").addEventListener("click", () => el.importInput.click());
    el.importInput.addEventListener("change", () => {
      const file = el.importInput.files?.[0];
      if (file) importHierarchyExcel(file);
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("确定恢复到打开页面时的初始数据吗？当前编辑会丢失。")) return;
      rows = structuredClone(INITIAL_ROWS);
      selectedId = rows[0]?.id || "";
      collapsed.clear();
      render();
    });
    el.searchInput.addEventListener("input", renderTree);
    render();
  </script>
</body>

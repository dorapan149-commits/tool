<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>功能位置编码编辑工具</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #fff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ec;
      --blue: #2563eb;
      --green: #148765;
      --red: #c2410c;
      --amber: #b7791f;
      --shadow: 0 14px 34px rgba(23, 32, 51, .10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      color: #fff;
      background: #101828;
    }
    h1 { margin: 0; font-size: 22px; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .hidden-input { display: none; }
    button, input, select { font: inherit; }
    button {
      height: 36px;
      padding: 0 12px;
      border: 1px solid #cfd7e6;
      border-radius: 7px;
      color: #1f2937;
      background: #fff;
      cursor: pointer;
      white-space: nowrap;
    }
    button.primary { color: #fff; background: var(--blue); border-color: var(--blue); }
    button.danger { color: #fff; background: var(--red); border-color: var(--red); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 360px;
      gap: 14px;
      padding: 14px;
      height: calc(100vh - 72px);
      min-height: 660px;
    }
    section {
      min-height: 0;
      overflow: hidden;
      border: 1px solid #e3e8f1;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #e8edf5;
      background: #fbfcff;
    }
    .panel-head strong { font-size: 15px; }
    .panel-body { padding: 14px; height: calc(100% - 49px); overflow: auto; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat {
      border: 1px solid #e5eaf3;
      border-radius: 8px;
      padding: 10px;
      background: #fbfcff;
    }
    .stat strong { display: block; font-size: 22px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 12px; }

      width: 100%;
      height: 38px;
      margin-bottom: 10px;
